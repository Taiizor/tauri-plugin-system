name: Bug Report
description: Report a bug in tauri-plugin-system
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call `cpuInfo()` from the JS API
        2. Check the returned `cores` field
        3. The value is incorrect
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
      multiple: true
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g., Windows 11 Build 26200, macOS 15.3, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: "e.g., 0.1.0"
    validations:
      required: true

  - type: input
    id: tauri-version
    attributes:
      label: Tauri Version
      placeholder: "e.g., 2.9.4"
    validations:
      required: true

  - type: textarea
    id: features
    attributes:
      label: Enabled Features
      description: Which Cargo features are enabled?
      placeholder: "e.g., default, all, or specific features like cpu, memory, gpu"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
